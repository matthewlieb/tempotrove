# https://docs.railway.app/reference/config-as-code
# Docker build: Nixpacks often fails on hatchling/pyproject wheels for this repo.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must NOT use "PYTHONPATH=. uvicorn …" — Railway parses that as an executable named "pythonpath=.".
# Wrap in sh -c so $PORT expands (Railway may exec the start command without a shell).
# Dockerfile CMD is the same; keep this aligned if the UI overrides CMD.
startCommand = "/bin/sh -c \"exec uvicorn src.web.app:app --host 0.0.0.0 --port $PORT\""
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
