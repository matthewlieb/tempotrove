# https://docs.railway.app/reference/config-as-code
# Docker build: Nixpacks often fails on hatchling/pyproject wheels for this repo.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use Python entrypoint so PORT comes from os.environ (Railway often exec's start command
# without a shell — then `uvicorn ... --port $PORT` passes the literal "$PORT").
# Clear any custom "uvicorn … $PORT" line in the Railway UI if deploys still fail.
startCommand = "python -m src.web.serve"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
